<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password | CookVala</title>
  <link rel="stylesheet" href="assets/style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <style>
    body { 
      background: linear-gradient(135deg, #f6fffb 0%, #ffffff 60%) no-repeat fixed;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
    }
    .auth-container { 
      max-width: 480px; 
      margin: 64px auto; 
      padding: 3rem; 
      background: #ffffff; 
      border-radius: 16px; 
      box-shadow: 0 12px 30px rgba(0,0,0,0.08); 
      border: 1px solid #eef2f3;
    }
    .brand-title {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #2f6c4f;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    #form-title {
      text-align: center; 
      margin-bottom: 1.25rem; 
      font-size: 1.25rem; 
      color: #44514b; 
      font-weight: 600;
    }
    .form-group { margin-bottom: 1.1rem; }
    .form-group label { 
      display: block; 
      margin-bottom: 0.5rem; 
      color: #3b4a43; 
      font-weight: 600; 
      font-size: 0.95rem; 
    }
    .form-group input { 
      width: 100%; 
      padding: 0.9rem; 
      border: 1px solid #dde5e8; 
      border-radius: 12px; 
      box-sizing: border-box; 
      font-size: 1rem;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      background: #fafcfd;
    }
    .form-group input:focus { 
      border-color: #3E7F62; 
      outline: none; 
      box-shadow: 0 0 0 3px rgba(62,127,98,0.15);
      background: #ffffff;
    }
    .btn-block { 
      width: 100%; 
      padding: 0.9rem; 
      background: linear-gradient(135deg, #3E7F62 0%, #2e604a 100%); 
      color: #ffffff; 
      border: none; 
      border-radius: 12px; 
      cursor: pointer; 
      font-size: 1rem; 
      font-weight: 700;
      transition: filter 0.15s ease, transform 0.05s ease;
    }
    .btn-block:hover { filter: brightness(0.95); }
    .btn-block:active { transform: translateY(1px); }
    .error { 
      background: #ffe9ea; 
      color: #c62828; 
      padding: 12px; 
      border-radius: 12px; 
      text-align: center; 
      margin-bottom: 1rem; 
      display: none; 
      font-size: 0.95rem;
      border: 1px solid #ffd1d4;
    }
    .success {
      background: #e6fffa;
      color: #2c7a7b;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 1rem;
      display: none;
      font-size: 0.95rem;
      border: 1px solid #b2f5ea;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <header class="header">
    <div class="inner">
      <a href="index.html" class="logo">CookVala</a>
    </div>
  </header>

  <main class="content">
    <div class="auth-container">
      <div class="brand-title">CookVala</div>
      <h2 id="form-title">Reset Your Password</h2>
      <div id="error-msg" class="error"></div>
      <div id="success-msg" class="success"></div>

      <form id="reset-form">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="password" required placeholder="******" minlength="6">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirm-password" required placeholder="******" minlength="6">
        </div>
        <button type="submit" class="btn-block" id="submit-btn">Reset Password</button>
      </form>

      <div style="text-align: center; margin-top: 1.5rem;">
        <a href="login.html" style="color: #2f6c4f; text-decoration: none; font-weight: 600;">Back to Login</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2025 CookVala. All rights reserved.</p>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('error-msg').textContent = 'Invalid or missing token.';
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('reset-form').classList.add('hidden');
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();

        if (data.ok) {
          successMsg.textContent = data.message + ' Redirecting to login...';
          successMsg.style.display = 'block';
          document.getElementById('reset-form').classList.add('hidden');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 3000);
        } else {
          errorMsg.textContent = data.error || 'Operation failed';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Network error';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
