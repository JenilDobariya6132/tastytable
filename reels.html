<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CookVala Reels | Short Food Videos</title>
  <meta name="description" content="Watch short, delicious cooking videos on CookVala Reels.">
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="assets/feed.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .reel-card {
        background: #000;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 20px;
        position: relative;
        height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .reel-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .reel-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        padding: 20px;
        color: #fff;
    }
    .reel-actions {
        position: absolute;
        right: 10px;
        bottom: 100px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
    }
    .reel-action-btn {
        background: rgba(255,255,255,0.2);
        border: none;
        color: #fff;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        backdrop-filter: blur(4px);
    }
    .reel-action-btn:hover {
        background: rgba(255,255,255,0.3);
    }
    .reel-info h3 { margin: 0 0 5px 0; font-size: 18px; }
    .reel-info p { margin: 0; font-size: 14px; opacity: 0.9; }
    .reel-author { display: flex; align-items: center; margin-bottom: 10px; }
    .reel-avatar { width: 30px; height: 30px; border-radius: 50%; background: #ddd; margin-right: 10px; display: flex; align-items: center; justify-content: center; color: #333; font-weight: bold;}
  </style>
</head>
<body>
  <header>
    <div class="wrap nav">
      <div class="brand">CookVala</div>
      <nav class="menu">
        <a href="index.html">Home</a>
        <a href="recipes.html">Recipes</a>
        <a href="reels.html" class="active" style="color:var(--accent)">Reels</a>
        <a href="blog.html">Blog</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="add-recipe.html">Add Recipe</a>
      </nav>
    </div>
  </header>
  <main class="wrap" style="max-width: 500px; padding-top: 20px;">
    <div id="reels-container">
        <!-- Reels loaded here -->
        <div style="text-align:center; padding: 40px;">Loading Reels...</div>
    </div>
  </main>
  
  <!-- Bottom Navigation for Mobile (Optional, can be added if needed to match "app-style") -->

  <script src="assets/auth-nav.js"></script>
  <script>
    (function() {
        // Intersection Observer for Auto-Play and View Recording
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target;
                if (entry.isIntersecting) {
                    video.play().catch(e => console.log('Auto-play prevented:', e));
                    startViewTimer(video);
                } else {
                    video.pause();
                    clearViewTimer(video);
                }
            });
        }, { threshold: 0.6 });

        const viewTimers = new Map();

        function startViewTimer(video) {
            if (viewTimers.has(video)) return;
            const id = video.dataset.id;
            const type = video.dataset.type;
            
            // Check session storage
            const key = 'viewed_' + type + '_' + id;
            if (sessionStorage.getItem(key)) return;

            const timer = setTimeout(() => {
                recordView(id, type);
                sessionStorage.setItem(key, '1');
                viewTimers.delete(video);
            }, 5000); // 5 seconds view threshold
            
            viewTimers.set(video, timer);
        }

        function clearViewTimer(video) {
            if (viewTimers.has(video)) {
                clearTimeout(viewTimers.get(video));
                viewTimers.delete(video);
            }
        }

        function recordView(id, type) {
            const endpoint = type === 'recipe' 
                ? '/recipes/' + id.replace('r-', '') + '/view' 
                : '/videos/' + id + '/view';
            
            fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: (typeof getUser === 'function' ? getUser()?.id : null) })
            }).then(r => r.json())
              .then(d => {
                  if(d.ok) console.log('View recorded for ' + type + ' ' + id);
              })
              .catch(console.error);
        }

        // Load Reels
        fetch('/api/reels')
            .then(r => {
                if(r.ok) return r.json();
                return { reels: [] }; 
            })
            .then(data => {
                const container = document.getElementById('reels-container');
                container.innerHTML = '';
                
                const reels = data.reels || [];
                if(reels.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#fff;">No reels yet. Be the first to upload!</p>';
                    return;
                }

                reels.forEach(reel => {
                    const reelId = reel.id;
                    const reelType = reel.type || 'reel';
                    const videoSrc = reel.video_url || reel.video || '';
                    const authorName = reel.author_name || reel.author || 'CookVala Chef';
                    const avatarChar = authorName.charAt(0).toUpperCase();

                    const div = document.createElement('div');
                    div.className = 'reel-card';
                    div.id = 'reel-' + reelId;
                    
                    div.innerHTML = `
                        <video class="reel-video" loop playsinline data-id="${reelId}" data-type="${reelType}" onclick="this.paused ? this.play() : this.pause()">
                            <source src="${videoSrc}" type="video/mp4">
                        </video>
                        <div class="reel-overlay">
                            <div class="reel-author">
                                <div class="reel-avatar">${avatarChar}</div>
                                <span>${authorName}</span>
                            </div>
                            <div class="reel-info">
                                <h3>${reel.title || 'Delicious Recipe'}</h3>
                                <p>${reel.description || reel.intro || ''}</p>
                            </div>
                        </div>
                        <div class="reel-actions">
                            <button class="reel-action-btn" onclick="likeReel('${reelId}', '${reelType}', this)">
                                <i class="fa-regular fa-heart"></i>
                            </button>
                            <span class="like-count" style="color:#fff; font-size:12px; text-align:center">${reel.likes || 0}</span>
                            
                            <button class="reel-action-btn" onclick="commentReel('${reelId}', '${reelType}')">
                                <i class="fa-regular fa-comment"></i>
                            </button>
                            <span style="color:#fff; font-size:12px; text-align:center">${reel.comments || 0}</span>

                            <div style="display: flex; flex-direction: column; align-items: center; margin-top: 5px;">
                                <i class="fa-regular fa-eye" style="color: #fff; font-size: 18px;"></i>
                                <span style="color:#fff; font-size:12px; text-align:center">${reel.view_count || 0}</span>
                            </div>

                            <button class="reel-action-btn" onclick="shareReel('${reelId}')">
                                <i class="fa-regular fa-share-from-square"></i>
                            </button>
                        </div>
                    `;
                    container.appendChild(div);
                    
                    // Start observing the video element
                    const videoEl = div.querySelector('video');
                    observer.observe(videoEl);
                });

                // Scroll to requested reel if provided in URL
                const urlParams = new URLSearchParams(window.location.search);
                const startId = urlParams.get('id');
                if(startId) {
                    setTimeout(() => {
                        const el = document.getElementById('reel-' + startId);
                        if(el) el.scrollIntoView({ behavior: 'smooth' });
                    }, 500);
                }
            })
            .catch(e => {
                console.error(e);
                document.getElementById('reels-container').innerHTML = '<p style="text-align:center; color:#fff;">Failed to load reels.</p>';
            });
    })();

    function likeReel(id, type, btn) {
        const endpoint = type === 'recipe'
            ? '/recipes/' + id.replace('r-', '') + '/like'
            : '/videos/' + id + '/like';
            
        // Get user ID (assuming auth-nav.js exposes getUser or we need to check cookie/storage)
        // For now, let's assume a global getUser() or similar if available, else try to get from somewhere
        // Since I don't have getUser guaranteed, I'll try to check local storage "user"
        let u = null;
        try { u = JSON.parse(localStorage.getItem('user')); } catch(e){}
        
        if (!u || !u.id) {
            alert('Please login to like');
            return;
        }

        fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: u.id })
        })
        .then(r => r.json())
        .then(d => {
            if (d.ok) {
                const icon = btn.querySelector('i');
                if (d.liked) {
                    icon.classList.remove('fa-regular');
                    icon.classList.add('fa-solid');
                    icon.style.color = '#e74c3c';
                } else {
                    icon.classList.remove('fa-solid');
                    icon.classList.add('fa-regular');
                    icon.style.color = '#fff';
                }
                // Update count visually (simple toggle for now)
                const countSpan = btn.nextElementSibling;
                let count = parseInt(countSpan.innerText);
                countSpan.innerText = d.liked ? count + 1 : Math.max(0, count - 1);
            }
        })
        .catch(console.error);
    }
    
    function commentReel(id, type) {
        // Placeholder for comment UI
        alert('Comments coming soon!');
    }
    function shareReel(id) {
        // Copy link
        const url = window.location.origin + '/reels.html?id=' + id;
        navigator.clipboard.writeText(url).then(() => alert('Link copied!')).catch(() => alert('Failed to copy'));
    }
  </script>
</body>
</html>
